<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Memo App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f6f7f9;
            color: #222;
            margin: 0;
            padding: 32px 16px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin: 0 0 20px;
            font-size: 28px;
            line-height: 1.2;
        }

        form {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input[type="text"],
        input[type="date"] {
            flex: 1;
            min-width: 0;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 16px;
        }

        input[type="date"] {
            max-width: 170px;
        }

        button {
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            padding: 10px 16px;
        }

        button:hover {
            background: #1d4ed8;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            margin-bottom: 10px;
            padding: 12px;
            word-break: break-word;
        }

        a {
            flex-shrink: 0;
            color: #dc2626;
            font-size: 14px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .empty-message {
            color: #6b7280;
            margin: 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            form {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            input[type="date"] {
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Task Memo App</h1>

        <form method="post">
            <input type="text" name="task" placeholder="Enter a task" required>
            <input type="date" name="due_date">
            <button type="submit">Add</button>
        </form>

        {% if tasks %}
            <ul>
                {% for task in tasks %}
                    <li>
                        <span>{{ task.text }}</span>
                        <a href="{{ url_for('delete_task', task_id=loop.index0) }}">Delete</a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="empty-message">No tasks yet.</p>
        {% endif %}
    </main>
</body>
</html>
